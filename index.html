<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubuntu Linux WebOS v10.0 - Fixed</title>
    <!-- Nhúng CSS cốt lõi của WebOS -->
    <link rel="stylesheet" href="style.css">
    

    <!-- Hệ thống thông báo nổi (Notification) -->
    <div id="notification-toast" class="toast hidden">
        <div class="toast-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e95420" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            <span id="toast-title" style="margin-left:6px; font-weight:bold;">Hệ thống</span>
        </div>
        <div class="toast-body" id="toast-msg">Nội dung thông báo</div>
    </div>

    <!-- Thanh trạng thái trên cùng (Top Bar) -->
    <div class="top-bar">
        <div class="left" onclick="showNotification('Hệ thống', 'Phím tắt: Win+T (Terminal), Win+X (About), Win+D (Ẩn ứng dụng)')">Activities</div>
        <div class="center" id="live-clock">00:00:00</div>
        <div class="right">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" style="margin-right:12px;"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="7" width="16" height="12" rx="2" ry="2"></rect><line x1="22" y1="11" x2="22" y2="15"></line></svg>
        </div>
    </div>

    <!-- Thanh ứng dụng bên trái (Ubuntu Dock) -->
    <div class="side-dock" id="main-dock">
        <div class="dock-item" id="dock-terminal" onclick="openWindow('terminal-window')">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
            <span class="tooltip">Terminal (Win+T)</span>
        </div>
        <div class="dock-item settings-icon" id="dock-about" onclick="openWindow('about-window')">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            <span class="tooltip">About System (Win+X)</span>
        </div>
    </div>

    <!-- Không gian màn hình Desktop chứa cửa sổ -->
    <div class="desktop" id="desktop-area">

        <!-- CỬA SỔ TERMINAL NATIVE XTERM (Đã sửa đổi id container nạp mượt mà) -->
        <div id="terminal-window" class="window" style="width: 760px; height: 460px; top: 60px; left: 110px;">
            <div class="window-header" onmousedown="dragElement(this.parentElement, event)">
                <div class="window-dots">
                    <span class="dot close" onclick="closeWindow('terminal-window')"></span>
                    <span class="dot minimize" onclick="closeWindow('terminal-window')"></span>
                    <span class="dot maximize" onclick="toggleMaximize('terminal-window')"></span>
                </div>
                <div class="window-title">tc@tinycore-kernel: ~</div>
            </div>
            <!-- Khung div chuẩn để Xterm nạp đồ họa dòng lệnh vào lòng trang web -->
            <div class="window-body terminal-integrated-body" id="xterm-container"></div>
        </div>

        <!-- CỬA SỔ ABOUT SYSTEM -->
        <div id="about-window" class="window hidden" style="width: 420px; height: 260px; top: 120px; left: 200px;">
            <div class="window-header" onmousedown="dragElement(this.parentElement, event)">
                <div class="window-dots">
                    <span class="dot close" onclick="closeWindow('about-window')"></span>
                    <span class="dot minimize" onclick="about-window")"></span>
                    <span class="dot maximize" onclick="toggleMaximize('about-window')"></span>
                </div>
                <div class="window-title">About Ubuntu WebOS</div>
            </div>
            <div class="window-body about-body">
                <img src="https://wikimedia.org" alt="Ubuntu Logo" width="55">
                <h3>Ubuntu WebOS v10.0</h3>
                <p>Hệ thống Terminal lõi kép, tự động bẫy câu lệnh gõ để nạp ứng dụng cục bộ.</p>
                <button class="ubuntu-btn" onclick="closeWindow('about-window')">Đóng</button>
            </div>
        </div>

        <!-- CỬA SỔ FIREFOX BROWSER (Sẵn sàng kích hoạt bằng lệnh sudo apt install firefox) -->
        <div id="firefox-window" class="window hidden" style="width: 760px; height: 500px; top: 50px; left: 150px;">
            <div class="window-header" onmousedown="dragElement(this.parentElement, event)">
                <div class="window-dots"><span class="dot close" onclick="closeWindow('firefox-window')"></span><span class="dot minimize" onclick="closeWindow('firefox-window')"></span><span class="dot maximize" onclick="toggleMaximize('firefox-window')"></span></div>
                <div class="window-title">Firefox Web Browser</div>
            </div>
            <div style="background: #38383D; padding: 6px 10px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #2B2A2F;">
                <div style="color: #aaa; display: flex; gap: 12px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></div>
                <div style="flex-grow: 1; background: #1C1B22; border-radius: 4px; padding: 4px 10px; color: #fff; font-size: 11px; display: flex; align-items: center; gap: 8px;">
                    <input type="text" value="https://google.com" style="background: transparent; border: none; outline: none; color: #fff; width: 100%; font-size: 11px;" readonly>
                </div>
            </div>
            <div class="window-body" style="padding:0; background:#fff; height: calc(100% - 72px);"><iframe src="https://google.com/webhp?igu=1" style="width:100%; height:100%; border:none; background:#fff;"></iframe></div>
        </div>

        <!-- CỬA SỔ MINECRAFT (Sẵn sàng kích hoạt bằng lệnh sudo apt install minecraft) -->
        <div id="minecraft-window" class="window hidden" style="width: 820px; height: 540px; top: 60px; left: 180px;">
            <div class="window-header" onmousedown="dragElement(this.parentElement, event)">
                <div class="window-dots"><span class="dot close" onclick="closeWindow('minecraft-window')"></span><span class="dot minimize" onclick="closeWindow('minecraft-window')"></span><span class="dot maximize" onclick="toggleMaximize('minecraft-window')"></span></div>
                <div class="window-title">Minecraft Java Edition v1.8.8 (Eaglercraft Cloud-WASM)</div>
            </div>
            <div class="window-body" style="padding:0; background:#000; height: calc(100% - 36px); width: 100%;">
                <iframe src="https://eaglercraft.win" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" msallowfullscreen="true" style="width: 100%; height: 100%; border: none; display: block;"></iframe>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
