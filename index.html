<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebOS</title>

<style>
body{
  margin:0;
  font-family:monospace;
  overflow:hidden;
}

#desktop{
  width:100vw;
  height:100vh;
  background:#0f172a;
  color:white;
  padding:15px;
}

.icon{
  width:90px;
  padding:10px;
  margin:10px;
  cursor:pointer;
  text-align:center;
  user-select:none;
  border-radius:8px;
}

.icon:hover{
  background:rgba(255,255,255,0.1);
}

.window{
  position:absolute;
  top:60px;
  left:120px;
  width:800px;
  height:500px;
  background:black;
  border:1px solid #444;
  display:none;
}

.titlebar{
  height:35px;
  background:#222;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
}

.close{
  background:red;
  border:none;
  color:white;
  cursor:pointer;
  width:30px;
}

#terminal{
  height:calc(100% - 35px);
  color:#00ff00;
  padding:10px;
  overflow:auto;
}

.input{
  display:flex;
}

.input input{
  flex:1;
  background:black;
  border:none;
  color:#00ff00;
  outline:none;
}

.app{
  position:absolute;
  top:100px;
  left:200px;
  width:900px;
  height:600px;
  background:white;
  display:none;
}

.app iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<div id="desktop">
  <div class="icon" onclick="openTerminal()">💻 Terminal</div>
  <div id="apps"></div>
</div>

<div class="window" id="terminalWin">
  <div class="titlebar">
    Terminal
    <button class="close" onclick="closeTerminal()">X</button>
  </div>
  <div id="terminal"></div>
</div>

<div class="app" id="appWin">
  <div class="titlebar">
    <span id="appTitle">App</span>
    <button class="close" onclick="closeApp()">X</button>
  </div>
</div>

<script>

const DISK_SIZE = 2048; // 2GB (MB)

let state = JSON.parse(localStorage.getItem("webos")) || {
  installed:{},
  used:0
};

const repo = {
  minecraft:{
    size:850,
    path:"/apps/eaglercraft/index.html",
    icon:"🟩"
  },
  doom:{
    size:35,
    path:"/apps/doom/index.html",
    icon:"🔥"
  }
};

function save(){
  localStorage.setItem("webos",JSON.stringify(state));
}

/* ---------- DESKTOP ---------- */

function renderIcons(){
  const apps=document.getElementById("apps");
  apps.innerHTML="";

  Object.keys(state.installed).forEach(p=>{
    let div=document.createElement("div");
    div.className="icon";
    div.innerHTML=repo[p].icon+" "+p;
    div.onclick=()=>openApp(p);
    apps.appendChild(div);
  });
}

renderIcons();

/* ---------- TERMINAL ---------- */

function openTerminal(){
  document.getElementById("terminalWin").style.display="block";
}

function closeTerminal(){
  document.getElementById("terminalWin").style.display="none";
}

const terminal=document.getElementById("terminal");

function print(t){
  terminal.innerHTML+=t+"<br>";
  terminal.scrollTop=terminal.scrollHeight;
}

function prompt(){
  let div=document.createElement("div");
  div.className="input";

  div.innerHTML=`
    <span>webos$ </span>
    <input>
  `;

  terminal.appendChild(div);

  let input=div.querySelector("input");

  input.focus();

  input.addEventListener("keydown",e=>{
    if(e.key==="Enter"){
      run(input.value);
      input.disabled=true;
      prompt();
    }
  });
}

function run(cmd){

  if(cmd==="help"){
    print("disk | sudo apt update | sudo apt install <pkg> | sudo apt remove <pkg> | minecraft | doom | clear");
    return;
  }

  if(cmd==="clear"){
    terminal.innerHTML="";
    return;
  }

  if(cmd==="disk"){
    print(`Disk 2GB`);
    print(`Used: ${state.used}MB`);
    print(`Free: ${DISK_SIZE-state.used}MB`);
    return;
  }

  if(cmd==="sudo apt update"){
    print("Hit: webos-main");
    print("Hit: webos-games");
    print("Done.");
    return;
  }

  if(cmd.startsWith("sudo apt install")){

    let pkg=cmd.split(" ")[3];

    if(!repo[pkg]){
      print("Package not found");
      return;
    }

    if(state.used+repo[pkg].size>DISK_SIZE){
      print("E: No space left on device");
      return;
    }

    state.installed[pkg]=true;
    state.used+=repo[pkg].size;
    save();
    renderIcons();

    print("Installing "+pkg+"...");
    print("Done.");
    return;
  }

  if(cmd.startsWith("sudo apt remove")){

    let pkg=cmd.split(" ")[3];

    if(!state.installed[pkg]) return;

    state.used-=repo[pkg].size;
    delete state.installed[pkg];

    save();
    renderIcons();

    print("Removed "+pkg);
    return;
  }

  if(cmd==="minecraft"){
    openApp("minecraft");
    return;
  }

  if(cmd==="doom"){
    openApp("doom");
    return;
  }

  print("command not found");
}

prompt();

/* ---------- APPS ---------- */

function openApp(name){

  let app=document.getElementById("appWin");

  document.getElementById("appTitle").innerText=name;

  app.style.display="block";

  app.innerHTML=`
    <div class="titlebar">
      ${name}
      <button class="close" onclick="closeApp()">X</button>
    </div>

    <iframe src="${repo[name].path}"></iframe>
  `;
}

function closeApp(){
  document.getElementById("appWin").style.display="none";
}

</script>

</body>
</html>
