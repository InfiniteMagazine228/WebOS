<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebOS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:monospace;
}

#desktop{
    width:100vw;
    height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    padding:20px;
}

.icon{
    width:90px;
    text-align:center;
    margin-bottom:20px;
    cursor:pointer;
    user-select:none;
}

.icon:hover{
    background:rgba(255,255,255,.1);
    border-radius:10px;
}

.icon img{
    font-size:40px;
}

.window{
    position:absolute;
    top:80px;
    left:120px;
    width:800px;
    height:500px;
    background:black;
    border:1px solid #444;
    display:none;
}

.titlebar{
    height:35px;
    background:#222;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
}

.close-btn{
    background:red;
    border:none;
    color:white;
    width:30px;
    height:25px;
    cursor:pointer;
}

#terminal{
    color:#00ff00;
    padding:10px;
    height:calc(100% - 35px);
    overflow-y:auto;
}

.input-line{
    display:flex;
}

.input-line input{
    background:black;
    color:#00ff00;
    border:none;
    outline:none;
    width:100%;
    font-family:monospace;
}

.app-window{
    position:absolute;
    top:120px;
    left:180px;
    width:900px;
    height:600px;
    background:white;
    display:none;
    border:1px solid #444;
}

.app-content{
    height:calc(100% - 35px);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
}
</style>
</head>

<body>

<div id="desktop">

    <div class="icon" onclick="openTerminal()">
        💻
        <div>Terminal</div>
    </div>

    <div id="apps"></div>

</div>

<!-- TERMINAL -->

<div class="window" id="terminalWindow">

    <div class="titlebar">
        <span>Terminal</span>

        <button class="close-btn"
                onclick="closeTerminal()">X</button>
    </div>

    <div id="terminal"></div>

</div>

<!-- APP WINDOW -->

<div class="app-window" id="appWindow">

    <div class="titlebar">
        <span id="appTitle">App</span>

        <button class="close-btn"
                onclick="closeApp()">X</button>
    </div>

    <div class="app-content" id="appContent">
    </div>

</div>

<script>

const terminal =
document.getElementById("terminal");

const installedPackages = [];

function openTerminal(){
    document.getElementById(
      "terminalWindow"
    ).style.display="block";

    if(!terminal.innerHTML){
        printLine("Welcome to WebOS");
        printLine("Type 'help'");
        newPrompt();
    }
}

function closeTerminal(){
    document.getElementById(
      "terminalWindow"
    ).style.display="none";
}

function printLine(text){
    terminal.innerHTML += text + "<br>";
    terminal.scrollTop =
    terminal.scrollHeight;
}

function newPrompt(){

    const line =
    document.createElement("div");

    line.className = "input-line";

    line.innerHTML = `
    <span>webos@localhost:~$&nbsp;</span>
    <input autofocus>
    `;

    terminal.appendChild(line);

    const input =
    line.querySelector("input");

    input.focus();

    input.addEventListener(
      "keydown",
      function(e){

        if(e.key==="Enter"){

            const cmd = input.value;

            input.disabled = true;

            execute(cmd);

            newPrompt();
        }

      }
    );

    terminal.scrollTop =
    terminal.scrollHeight;
}

function execute(cmd){

    if(cmd==="help"){

        printLine(`
Commands:<br>
help<br>
clear<br>
sudo apt update<br>
sudo apt install minecraft<br>
sudo apt install doom
`);

        return;
    }

    if(cmd==="clear"){

        terminal.innerHTML="";
        return;
    }

    if(cmd==="sudo apt update"){

        printLine(
        "Hit:1 webos-main"
        );

        printLine(
        "Hit:2 webos-games"
        );

        printLine(
        "Reading package lists... Done"
        );

        return;
    }

    if(cmd==="sudo apt install minecraft"){

        installPackage(
        "minecraft",
        "🟩"
        );

        return;
    }

    if(cmd==="sudo apt install doom"){

        installPackage(
        "doom",
        "🔥"
        );

        return;
    }

    if(cmd==="minecraft"){

        launchApp(
        "Minecraft",
        "Minecraft Clone (Eaglercraft)"
        );

        return;
    }

    if(cmd==="doom"){

        launchApp(
        "DOOM",
        "DOOM HTML5"
        );

        return;
    }

    printLine(
    cmd + ": command not found"
    );
}

function installPackage(name, icon){

    if(installedPackages.includes(name)){

        printLine(
        name + " already installed"
        );

        return;
    }

    installedPackages.push(name);

    printLine(
    "Installing " + name + "..."
    );

    printLine(
    "Done."
    );

    createDesktopIcon(
    name,
    icon
    );
}

function createDesktopIcon(
name,
icon
){

    const apps =
    document.getElementById("apps");

    const div =
    document.createElement("div");

    div.className="icon";

    div.innerHTML=`
        ${icon}
        <div>${name}</div>
    `;

    div.onclick=
    ()=>launchInstalled(name);

    apps.appendChild(div);
}

function launchInstalled(name){

    if(name==="minecraft"){

        launchApp(
        "Minecraft",
        "Minecraft Clone (Eaglercraft)"
        );
    }

    if(name==="doom"){

        launchApp(
        "DOOM",
        "DOOM HTML5"
        );
    }
}

function launchApp(
title,
content
){

    document.getElementById(
    "appTitle"
    ).textContent=title;

    document.getElementById(
    "appContent"
    ).innerHTML=content;

    document.getElementById(
    "appWindow"
    ).style.display="block";
}

function closeApp(){

    document.getElementById(
    "appWindow"
    ).style.display="none";
}

</script>

</body>
</html>
