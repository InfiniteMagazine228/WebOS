<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>WebOS</title>
    <style>
        body { background-color: #1e1e1e; color: #00ff00; font-family: 'Courier New', Courier, monospace; padding: 10px; margin: 0; }
        #output { white-space: pre-wrap; word-wrap: break-word; margin-bottom: 10px; }
        #input-line { display: flex; }
        #prompt { color: #87ff00; margin-right: 5px; }
        #cmd { background: transparent; border: none; color: #ffffff; font-family: inherit; font-size: inherit; outline: none; flex: 1; }
    </style>
</head>
<body>

<div id="output">Chào mừng đến với Tinycore-Kernel Terminal! Gõ 'help' để xem danh sách lệnh.</div>
<div id="input-line">
    <span id="prompt">tc@tinycore-kernel:~$</span>
    <input type="text" id="cmd" autofocus autocomplete="off">
</div>

<script>
const cmdInput = document.getElementById('cmd');
const output = document.getElementById('output');

// Danh sách các ứng dụng WebOS giả lập
const webOSApps = {
    'browser': 'Đang khởi động Trình duyệt Web...',
    'settings': 'Đang mở Cài đặt hệ thống...',
    'filemanager': 'Đang mở Trình quản lý tệp...',
    'texteditor': 'Đang mở Trình chỉnh sửa văn bản...'
};

function printText(text) {
    output.innerText += "\n" + text;
    window.scrollTo(0, document.body.scrollHeight);
}

cmdInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        let input = cmdInput.value.trim();
        cmdInput.value = '';
        if (input === '') return;

        printText("tc@tinycore-kernel:~$ " + input);
        handleCommand(input);
    }
});

function handleCommand(input) {
    let args = input.split(' ');
    let baseCmd = args[0];

    // 1. Nhóm câu lệnh do bạn yêu cầu
    if (input === 'sudo apt update') {
        printText("Hit:1 http://ubuntu.com focal InRelease\nReading package lists... Done\nAll packages are up to date.");
        return;
    }
    if (input === 'sudo apt install game') {
        printText("Reading package lists...\nBuilding dependency tree...\nInstalling tetris-cli... Done!");
        return;
    }
    if (input === 'sudo apt install minecraft' || input === 'sudo apt install eaglecraft') {
        printText("Downloading Eaglecraft assets...\nSetting up Java Runtime...\nMinecraft (Eaglecraft) đã cài đặt thành công! Gõ 'run-eaglecraft' để chơi.");
        return;
    }
    if (input === 'sudo apt install doom') {
        printText("Downloading shareware DOOM WAD...\nCompiling chocolate-doom...\nDOOM đã cài đặt thành công! Gõ 'run-doom' để khởi động.");
        return;
    }
    if (baseCmd === 'help') {
        printText("--- DANH SÁCH LỆNH ---" +
                  "\n• Nhóm cơ bản: help, neofetch, clear, date, whoami, uptime, echo, ping, history, uname, exit" +
                  "\n• Cài đặt: sudo apt update, sudo apt install [game / minecraft / doom]" +
                  "\n• Ứng dụng WebOS: open [browser / settings / filemanager / texteditor]");
        return;
    }
    if (baseCmd === 'neofetch') {
        printText("   /\\_/\\     tc@tinycore-kernel\n  ( o.o )    ------------------\n   > ^ <     OS: WebOS Simulator v1.0\n             Kernel: Tinycore-Kernel 2026\n             Uptime: 5 mins\n             Shell: bash custom\n             Resolution: 1024x768\n             CPU: Virtual Core i7\n             Memory: 2048MiB / 8192MiB");
        return;
    }

    // 2. Nhóm 4 Ứng dụng WebOS (sử dụng lệnh: open [tên_app])
    if (baseCmd === 'open') {
        let appName = args[1];
        if (webOSApps[appName]) {
            printText(webOSApps[appName]);
        } else {
            printText("Không tìm thấy ứng dụng. Thử lại: open [browser, settings, filemanager, texteditor]");
        }
        return;
    }

    // 3. Thêm 10 câu lệnh hữu dụng bổ sung
    switch(baseCmd) {
        case 'clear':
            output.innerText = 'Terminal đã được làm sạch.';
            break;
        case 'date':
            printText(new Date().toString());
            break;
        case 'whoami':
            printText("tc (Temporary Custom User)");
            break;
        case 'uptime':
            printText("up 12 minutes, 1 user, load average: 0.00, 0.01, 0.05");
            break;
        case 'echo':
            printText(args.slice(1).join(' '));
            break;
        case 'ping':
            printText("PING 8.8.8.8 (8.8.8.8) 56(84) bytes of data.\n64 bytes from 8.8.8.8: icmp_seq=1 ttl=115 time=12.4 ms\n--- 8.8.8.8 ping statistics --- 1 packets transmitted, 1 received.");
            break;
        case 'history':
            printText("1  help\n2  sudo apt update\n3  neofetch\n4  open browser");
            break;
        case 'uname':
            printText("Linux tinycore-kernel 5.15.0-generic x86_64 GNU/Linux");
            break;
        case 'exit':
            printText("Đang đóng phiên làm việc Terminal...");
            break;
        case 'run-doom':
            printText("Đang khởi động DOOM... (Trò chơi đang chạy ngầm)");
            break;
        default:
            printText(`bash: ${baseCmd}: command not found. Gõ 'help' để xem các lệnh có sẵn.`);
    }
}
</script>
</body>
</html>
